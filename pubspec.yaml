name: hisaab_kitaab
description: "Iron/laundry vendor ledger app for tracking customer accounts and payments."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.8.4

  # UI
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Crash Monitoring
  sentry_flutter: ^9.0.0

  # Security
  local_auth: ^2.3.0

  # Local storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # Utilities
  flutter_dotenv: ^5.2.1
  csv: ^6.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  pdf: ^3.11.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/google_fonts/
    - .env
